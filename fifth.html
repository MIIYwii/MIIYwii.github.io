<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网上书城-注册</title>
    <style>
       
        .wrap {
            width: 420px;
            margin: 40px auto;
            border: 1px solid #777;
        }
        
        .top-bar {
            background-color: #888888;
            padding: 10px;
            text-align: center;
        }
        .top-bar h2 {
            color: #fff;
            margin: 0;
            font-size: 20px;
        }
      
        .reg-box {
            background: #eeeeee;
            padding: 15px;
        }
        h3 {
            margin-top: 0;
            font-size: 16px;
        }
        table {
            margin: 10px auto;
        }
        td {
            padding: 7px 4px;
        }
       
        .input-item {
            position: relative;
        }
      
        .input-item .icon {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
        
        .input-item input {
            width: 210px;
            height: 26px;
            border: 1px solid #999;
            padding-left: 30px;
            box-sizing: border-box;
        }
      
        .submit-btn {
            width: 218px;
            height: 28px;
            background: #555555;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
<div class="wrap">
    
    <div class="top-bar">
        <h2>网上书城</h2>
    </div>
    <div class="reg-box">
        <h3>✚ 注册新用户</h3>
        <form>
            <table>
                <tr>
                    <td class="input-item">
                        <span class="icon">👤</span>
                        <input type="text" placeholder="用户名">
                    </td>
                </tr>
                <tr>
                    <td class="input-item">
                        <span class="icon">🔑</span>
                        <input type="password" placeholder="密码">
                    </td>
                </tr>
                <tr>
                    <td class="input-item">
                        <span class="icon">🔑</span>
                        <input type="password" placeholder="确认密码">
                    </td>
                </tr>
                <tr>
                    <td class="input-item">
                        <span class="icon">📩</span>
                        <input type="email" placeholder="电子邮件">
                    </td>
                </tr>
                <tr>
                    <td>
                        <input class="submit-btn" type="submit" value="注册新用户">
                    </td>
                </tr>
            </table>
        </form>
    </div>
</div>
</body>
</html>
