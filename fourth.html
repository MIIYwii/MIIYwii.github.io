<!DOCTYPE html>
<html lang="en">
<head>

        }

        #center1{

        #center2{
            width: 100px;
            height: 50px;

            height: 50px;
            background:url(./images/point1.png) no-repeat;
            position: absolute;
            top: 50%;
            left: 56.5%;
        }
    </style>
</head>
<body>
    <div class="all">
        <div id="left"></div>
        <div id="right"></div>
        <div id="bottom">

            <div id="center3"></div>

        </div>
        

    </div>
</body>
</html>
